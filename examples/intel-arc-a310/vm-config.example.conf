# Proxmox VM config example: Windows 11 + Intel Arc A310 passthrough
# File would live at: /etc/pve/qemu-server/<vmid>.conf
#
# Status: In validation (initial config verified 2026-04-20; promotes to production 2026-05-04
#         pending the ≥2-week uptime threshold from CONTRIBUTING.md § 1).
# Hardware: Intel Arc A310, 4 GB VRAM, driver 32.0.101.8629
# Validated on: Proxmox VE 9.1, kernel 6.17.x, Intel 13th-gen host CPU
# See: docs/vendors/intel-arc-dg2.md
#
# Sanitized per RFC 5737 / RFC 7042. Replace IDs, MACs, disks with your own.

# -------- Critical passthrough-related lines --------------------------------

# QEMU args: the ONLY line that actually unlocks Code-43-free operation.
# See docs/vendors/intel-arc-dg2.md § Code-43-Fix for a full breakdown.
# Flags match the production-validated setup 1:1 (including +kvm_pv_unhalt,+invtsc paravirt).
args: -cpu host,kvm=off,hv_vendor_id=GenuineIntel,-hypervisor,+kvm_pv_unhalt,+invtsc,hv_relaxed,hv_spinlocks=0x1fff

# q35 machine type -- required for PCIe passthrough (and needed for OVMF boot).
machine: pc-q35-9.2

# OVMF firmware (UEFI) -- Windows 11 requires UEFI + Secure Boot capable.
bios: ovmf
efidisk0: local-lvm:vm-100-disk-1,efitype=4m,pre-enrolled-keys=1,size=4M

# TPM 2.0 virtual device (required by Windows 11).
tpmstate0: local-lvm:vm-100-disk-2,size=4M,version=v2.0

# CPU as "host" -- Intel driver needs the real CPU capabilities exposed.
cpu: host
# Ballooning OFF. VFIO pins the GPU's memory; dynamic balloon would conflict.
balloon: 0
# Virtual VGA disabled -- guest drives its own output via the passed-through GPU.
# (If you need a fallback display, set vga: std; but expect perf artifacts.)
vga: none

# The GPU passthrough itself.
#  - 0000:03:00  = PCI bus:device (no function suffix = all functions of this device)
#                  On this host: GPU at 03:00.0 only. Audio is on a separate bus (see hostpci1).
#                  Other boards route DG2 Audio to 03:00.1 (same bus) — `0000:03:00`
#                  still captures it via the no-suffix form.
#  - pcie=1      = expose as PCIe (not legacy PCI); required for q35
#  - x-vga=0 / romfile= = intentionally omitted; modern Arc needs neither
hostpci0: 0000:03:00,pcie=1
# DG2 Audio Controller companion (HDMI audio). On this board the audio lives on a
# separate PCIe bus (04:00.0), so it gets its own hostpci entry. On boards where
# audio is on the same bus as the GPU (03:00.1), `hostpci0: 0000:03:00` alone
# covers both functions and this line is not needed.
hostpci1: 0000:04:00,pcie=1

# -------- Memory / CPU sizing (tune to your host) ---------------------------
memory: 16384
sockets: 1
cores: 8
numa: 1

# -------- Standard VM bits --------------------------------------------------
name: win11-gpu
ostype: win11
boot: order=scsi0
scsihw: virtio-scsi-single
agent: 1
net0: virtio=00:00:5E:00:53:01,bridge=vmbr0,firewall=1
scsi0: local-lvm:vm-100-disk-0,discard=on,iothread=1,size=128G
# Windows ISO for first install; remove after OS is installed.
# ide2: local:iso/Win11_22H2.iso,media=cdrom
# Virtio driver ISO (for Windows install-time driver load).
# ide3: local:iso/virtio-win-0.1.240.iso,media=cdrom

# -------- Optional -----------------------------------------------------------
# Reset hookscript (only if the host complains about PCI reset failing):
# hookscript: local:snippets/reset-method.sh
#
# Install via: sudo ./scripts/install-reset-hook.sh <vmid> 0000:03:00.0 bus
