name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts/
        run: |
          find scripts -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning

      - name: Run ShellCheck on hookscripts/
        run: |
          find hookscripts -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning

      - name: Run ShellCheck on examples/
        run: |
          find examples -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning

  syntax-check:
    name: Bash Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          find scripts hookscripts examples -name "*.sh" -print0 \
            | xargs -0 -r -I {} bash -n {}

  markdown-links:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
